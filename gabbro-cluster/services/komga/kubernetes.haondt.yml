components:
  primary:
    image: docker.io/gotson/komga:1.24.4@sha256:dae630271561b642d47c9723803ec77900d1f0a803fbe6a42da69db5b21ebaeb
    talos: +!
    resources.limits.memory: 8Gi
    networking:
      ports:
        http: 25600
      gateway.http_routes:
        - port: http
          host: "komga.{{ haondt__default_host }}"
    security:
      user: "{{ media__puid }}"
      group: "{{ media__pgid }}"
    volumes:
      config:
        src.host:
          dir: /mnt/pepper/gabbro_cluster/komga/config
          read_only: false
          create: true
        dest.dir: /config
      data:
        src.host:
          dir: /mnt/carrot/gabbro/komga/data
          create: true
          read_only: false
        dest.dir: /data
    startup.tasks:
      - chown:
          paths: [/data,/config]
          owner: "{{ media__puid }}:{{ media__pgid }}"
    # environment:
    #   - raw:
    #       # process memory limit
    #       JAVA_TOOL_OPTIONS: -Xmx1g
