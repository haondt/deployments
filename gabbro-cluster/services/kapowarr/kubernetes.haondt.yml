components:
  primary:
    image: docker.io/mrcas/kapowarr:v1.3.1@sha256:d455797e4f2c5b1a8ccc5ce05c427f1af2179451bb1af195ca3fa8c3e928623b
    talos: +!
    resources.limits.memory: 1Gi
    networking:
      ports:
        http: 5656
      gateway.http_routes:
        - port: http
          host: "kapowarr.{{ haondt__default_host }}"
      dependencies:
        - name: primary
          app: qbittorrent
          port: http
      gluetun:
        protonvpn: {}
        wireguard.private_key: "{{ gluetun__wireguard__private_key }}"
        dns.upstream_resolvers: [cloudflare,quad9,google]
        firewall.input_ports: [http]
    volumes:
      db:
        src.host:
          dir: /mnt/pepper/gabbro_cluster/kapowarr/db
          read_only: false
          create: true
        dest.dir: /app/db
      comics:
        src.host:
          dir: /mnt/carrot/gabbro/komga/data/comics
          read_only: false
        dest.dir: /comics
      downloads:
        src.host.dir: "{{ media__host_dirs__downloads }}"
        dest.dir: /downloads
      temp-downloads:
        src.host:
          dir: /mnt/carrot/gabbro/kapowarr/temp_downloads
          create: true
          read_only: false
        dest.dir: /app/temp_downloads
    startup.tasks:
      - chown:
          paths: [/app/db,/app/temp_downloads]
          owner: "{{ media__puid }}:{{ media__pgid }}"
    environment:
      - raw:
          PUID: "{{ media__puid }}"
          PGID: "{{ media__pgid }}"
