components:
  primary:
    image: docker.io/mrcas/kapowarr:v1.3.0@sha256:d506675aaf15a415467090a7451351904a5ae5cef3bdd351f1a9a23e5989f5b3
    talos: +!
    resources.limits.memory: 1Gi
    networking:
      ports:
        http: 5656
      gateway.http_routes:
        - port: http
          host: "kapowarr.{{ haondt__default_host }}"
      dependencies:
        - name: primary
          app: qbittorrent
          port: http
    volumes:
      db:
        src.host:
          dir: /mnt/pepper/gabbro_cluster/kapowarr/db
          read_only: false
          create: true
        dest.dir: /app/db
      comics:
        src.host:
          dir: /mnt/carrot/gabbro/komga/data/comics
          read_only: false
        dest.dir: /comics
      downloads:
        src.host.dir: "{{ media__host_dirs__downloads }}"
        dest.dir: /downloads
      temp-downloads:
        src.host:
          dir: /mnt/carrot/gabbro/kapowarr/temp_downloads
          create: true
          read_only: false
        dest.dir: /app/temp_downloads
    startup.tasks:
      - chown:
          paths: [/app/db,/app/temp_downloads]
          owner: "{{ media__puid }}:{{ media__pgid }}"
    environment:
      - raw:
          PUID: "{{ media__puid }}"
          PGID: "{{ media__pgid }}"
