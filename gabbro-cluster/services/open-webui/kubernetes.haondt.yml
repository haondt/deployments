components:
  primary:
    image: ghcr.io/open-webui/open-webui:v0.10.1@sha256:080a25a7cfc995ad64013a3827a54e681d4a4d70e5a5f79c1209206aefe13265
    talos: +!
    resources.limits.memory: 4Gi
    networking:
      ports:
        http: 8080
      gateway.http_routes:
        - port: http
          host: "open-webui.{{ haondt__default_host }}"
    volumes:
      config:
        src.host:
          dir: /mnt/pepper/gabbro_cluster/open-webui/data
          read_only: false
          create: true
        dest.dir: /app/backend/data
    environment:
      - raw:
          OPENAI_API_BASE_URLs: https://opencode.ai/zen/go/v1
      - secret: true
        raw:
          WEBUI_SECRET_KEY: "{{ open_webui__secret_key }}"
          OPENAI_API_KEYS: "{{ opencode__api_key }}"
