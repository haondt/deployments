components:
  primary:
    image: ghcr.io/open-webui/open-webui:v0.9.6@sha256:90eae5b419e40b4c3dd684582b2c83440b36f9ae2f6532c09639b2ba4ee65158
    talos: +!
    resources.limits.memory: 4Gi
    networking:
      ports:
        http: 8080
      gateway.http_routes:
        - port: http
          host: "open-webui.{{ haondt__default_host }}"
    volumes:
      config:
        src.host:
          dir: /mnt/pepper/gabbro_cluster/open-webui/data
          read_only: false
          create: true
        dest.dir: /app/backend/data
    environment:
      - raw:
          OPENAI_API_BASE_URLs: https://opencode.ai/zen/go/v1
      - secret: true
        raw:
          WEBUI_SECRET_KEY: "{{ open_webui__secret_key }}"
          OPENAI_API_KEYS: "{{ opencode__api_key }}"
