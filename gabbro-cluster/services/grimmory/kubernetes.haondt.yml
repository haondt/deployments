components:
  primary:
    image:  grimmory/grimmory:v2.3.0
    talos: +!
    resources.limits.memory: 1Gi
    networking:
      ports:
        http: 6060
      dependencies:
        - name: db
          port: http
      gateway.http_routes:
        - port: http
          host: "audiobookshelf.{{ haondt__default_host }}"
    volumes:
      config:
        src.host:
          dir: "/mnt/pepper/gabbro_cluster/grimmory/data"
          read_only: false
          create: true
        dest.dir: /app/data
      books:
        src.host:
          dir: /mnt/carrot/gabbro/grimmory/books
          create: true
          read_only: false
        dest.dir: /books
      bookdrop:
        src.host:
          dir: /mnt/carrot/gabbro/grimmory/bookdrop
          create: true
          read_only: false
        dest.dir: /bookdrop
    startup.tasks:
      - chown:
          paths: [/app/data,/books,/bookdrop]
          owner: "{{ media__puid }}:{{ media__pgid }}"

    environment:
      - raw:
          USER_ID: "{{ media__pgid }}"
          GROUP_ID: "{{ media__puid }}"
          BOOKLORE_PORT: "6060"
          DATABASE_URL: mariadb://grimmory-db:3306/grimmory
          DATABASE_USERNAME: grimmory
          DATABASE_PASSWORD: grimmory

  db:
    image: docker.io/library/mariadb:11.4.5
    talos: ^!
    networking:
      ports:
        http: 3306
    volumes:
      db-data:
        src.host:
          dir: /mnt/pepper/gabbro_cluster/grimmory/db
          create: true
          read_only: false
        dest.dir: /var/lib/mysql
    environment:
      - raw:
          MARIADB_DATABASE: grimmory
          MARIADB_USER: grimmory
          MARIADB_PASSWORD: grimmory
          MARIADB_ROOT_PASSWORD: grimmory
