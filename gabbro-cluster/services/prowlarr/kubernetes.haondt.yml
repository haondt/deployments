components:
  primary:
    image: lscr.io/linuxserver/prowlarr:develop@sha256:e6b0cd601b61d2d165b9333fc56dd3a63f7a087c7806114399b770796f0de951
    talos: +!
    resources.limits.memory: 512Mi
    networking:
      ports:
        http: 9696
      gateway.http_routes:
        - port: http
          host: "prowlarr.{{ haondt__default_host }}"
      dependencies:
        - name: primary
          app: sonarr
          port: http
        - name: primary
          app: radarr
          port: http
        - name: hd
          app: radarr
          port: http
    volumes:
      config:
        src.pvc: {}
        dest.dir: /config
    startup:
      tasks:
        - chown:
            paths: [/config]
            owner: "{{ media__puid }}:{{ media__pgid }}"
    environment:
      - raw:
          PGID: "{{ media__pgid }}"
          PUID: "{{ media__puid }}"
