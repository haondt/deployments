components:
  primary:
    image: lscr.io/linuxserver/prowlarr:develop@sha256:edaa930c72b3e9edfd88dbb785e9a253da0a5d438a08646d26e7de4a3fbd6d2c
    talos: +!
    resources.limits.memory: 512Mi
    networking:
      ports:
        http: 9696
      gateway.http_routes:
        - port: http
          host: "prowlarr.{{ haondt__default_host }}"
      dependencies:
        - name: primary
          app: sonarr
          port: http
        - name: primary
          app: radarr
          port: http
        - name: hd
          app: radarr
          port: http
    volumes:
      config:
        src.pvc: {}
        dest.dir: /config
    startup:
      tasks:
        - chown:
            paths: [/config]
            owner: "{{ media__puid }}:{{ media__pgid }}"
    environment:
      - raw:
          PGID: "{{ media__pgid }}"
          PUID: "{{ media__puid }}"
