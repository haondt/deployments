components:
  postgres:
    image: docker.io/library/postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    talos: ^!
    networking:
      ports:
        http: 5432
      ip_addresses:
        - ip: 192.168.1.213
          ports: [http]
    resources:
      limits.memory: 1Gi
    volumes:
      db-data:
        src.tmpfs.size: 256Mi
        dest.dir: /var/lib/postgresql
    environment:
      - raw:
          POSTGRES_DB: haondt
          POSTGRES_PASSWORD: postgres
          PGUSER: postgres
