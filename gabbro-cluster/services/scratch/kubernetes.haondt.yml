components:
  postgres:
    image: docker.io/library/postgres:18-alpine@sha256:ecafd34249b5c248f3cb6ebe339584ee6448b36fad3f0a827ae5e8efbae6afda
    talos: ^!
    networking:
      ports:
        http: 5432
      ip_addresses:
        - ip: 192.168.1.213
          ports: [http]
    resources:
      limits.memory: 1Gi
    volumes:
      db-data:
        src.tmpfs.size: 256Mi
        dest.dir: /var/lib/postgresql
    environment:
      - raw:
          POSTGRES_DB: haondt
          POSTGRES_PASSWORD: postgres
          PGUSER: postgres
