components:
  postgres:
    image: docker.io/library/postgres:18-alpine@sha256:52098013b4b64a746626437d38afc03cabff6cdeb4d3d92e2342aa95f0ce56ea
    talos: ^!
    networking:
      ports:
        http: 5432
      ip_addresses:
        - ip: 192.168.1.213
          ports: [http]
    resources:
      limits.memory: 1Gi
    volumes:
      db-data:
        src.tmpfs.size: 256Mi
        dest.dir: /var/lib/postgresql
    environment:
      - raw:
          POSTGRES_DB: haondt
          POSTGRES_PASSWORD: postgres
          PGUSER: postgres
