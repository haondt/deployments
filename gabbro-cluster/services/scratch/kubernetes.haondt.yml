components:
  postgres:
    image: docker.io/library/postgres:18-alpine@sha256:c48f944df2efbcece2dc4ea6725554f97d430fc0a4fbcfbeb31803b22dc33331
    talos: ^!
    networking:
      ports:
        http: 5432
      ip_addresses:
        - ip: 192.168.1.213
          ports: [http]
    resources:
      limits.memory: 1Gi
    volumes:
      db-data:
        src.tmpfs.size: 256Mi
        dest.dir: /var/lib/postgresql
    environment:
      - raw:
          POSTGRES_DB: haondt
          POSTGRES_PASSWORD: postgres
          PGUSER: postgres
