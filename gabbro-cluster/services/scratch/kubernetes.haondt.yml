components:
  postgres:
    image: docker.io/library/postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    talos: ^!
    networking:
      ports:
        http: 5432
      ip_addresses:
        - ip: 192.168.1.213
          ports: [http]
    resources:
      limits.memory: 1Gi
    volumes:
      db-data:
        src.tmpfs.size: 256Mi
        dest.dir: /var/lib/postgresql
    environment:
      - raw:
          POSTGRES_DB: haondt
          POSTGRES_PASSWORD: postgres
          PGUSER: postgres
