components:
  primary:
    image: &gramps_image ghcr.io/gramps-project/grampsweb:26.6.1@sha256:563d05ebb788fd42695ab4f5ec05efbfb86aa73d25901e6428fa9b0aab763551
    talos: "+:!!!?"
    resources.limits.memory: 2Gi
    networking:
      dependencies: &gramps_net_deps
        - name: redis
          port: http
      ports:
        http: 5000
      gateway.http_routes:
        - port: http
          host: "gramps.{{ haondt__default_host }}"
    volumes: &gramps_volumes
      users:
        src.host:
          dir: "/mnt/pepper/gabbro_cluster/gramps/users"
          read_only: false
          create: true
        dest.dir: /app/users
      index:
        src.host:
          dir: "/mnt/pepper/gabbro_cluster/gramps/index"
          read_only: false
          create: true
        dest.dir: /app/indexdir
      thumb-cache:
        src.host:
          dir: "/mnt/carrot/gabbro/gramps/thumb_cache"
          read_only: false
          create: true
        dest.dir: /app/thumbnail_cache
      cache:
        src.host:
          dir: "/mnt/carrot/gabbro/gramps/cache"
          read_only: false
          create: true
        dest.dir: /app/cache
      secret:
        src.host:
          dir: "/mnt/pepper/gabbro_cluster/gramps/secret"
          read_only: false
          create: true
        dest.dir: /app/secret
      db:
        src.host:
          dir: "/mnt/pepper/gabbro_cluster/gramps/db"
          read_only: false
          create: true
        dest.dir: /root/.gramps/grampsdb
      media:
        src.host:
          dir: "/mnt/carrot/gabbro/gramps/media"
          read_only: false
          create: true
        dest.dir: /app/media
      tmp:
        src.host:
          dir: "/mnt/pepper/gabbro_cluster/gramps/tmp"
          read_only: false
          create: true
        dest.dir: /tmp
    environment: &gramps_env
      - raw:
          GRAMPSWEB_TREE: "Gramps Web"
          GRAMPSWEB_CELERY_CONFIG__broker_url: "redis://gramps-redis:6379/0"
          GRAMPSWEB_CELERY_CONFIG__result_backend: "redis://gramps-redis:6379/0"
          GRAMPSWEB_RATELIMIT_STORAGE_URI: redis://gramps-redis:6379/1
          GRAMPSWEB_BASE_URL: "https://gramps.{{ haondt__default_host }}"
      - secret: true
        raw:
          GRAMPSWEB_SECRET_KEY: "{{ gramps__secret_key }}"
  worker:
    image: *gramps_image
    talos: x
    resources.limits.memory: 2Gi
    networking.dependencies: *gramps_net_deps
    command:
      - celery
      - '-A'
      - gramps_webapi.celery
      - worker
      - '--loglevel=INFO'
      - '--concurrency=2'
    volumes: *gramps_volumes
    environment: *gramps_env

  redis:
    image: docker.io/valkey/valkey:8-alpine@sha256:77643d152547b446fc15cbafaff22004545663fcd40c6b28038ad283837baa75
    talos: ^!
    networking.ports.http: 6379
