components:
  primary:
    image: registry.gitlab.com/haondt/cicd/registry/jobs:0.0.1
    talos: x
    networking:
      ports:
        http: 1880
      gateway.http_routes:
        - port: http
          host: "jobs.{{ haondt__default_host }}"
      dependencies:
        - name: redis
          port: http
    volumes:
      node-red-settings:
        src.file: settings.js
        dest.file: /data/settings.js
      node-red-data:
        src.pvc: {}
        dest.dir: /data
    environment:
      - file: jobs.env
        secret: true

  redis:
    image: docker.io/library/redis:latest@sha256:1c054d54ecd1597bba52f4304bca5afbc5565ebe614c5b3d7dc5b7f8a0cd768d
    talos: +!
    networking:
      ports:
        http: 6379
    volumes:
      redis-data:
        src.pvc: {}
        dest.dir: /data

  redis-insight:
    image: docker.io/redis/redisinsight:latest@sha256:55542a762210bb1cd681410282642bac0970f780f39bc134565394a81b1f1fd9
    talos: +!
    networking:
      ports:
        http: 5540
      gateway.http_routes:
        - port: http
          host: "jobs-redis.{{ haondt__default_host }}"
      dependencies:
        - name: redis
          port: http
    volumes:
      redis-insight-data:
        src.pvc: {}
        dest.dir: /data
