services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest@sha256:33d861fd6ebcdc0f8d946ace22fa1efc2e3fc81951028bca2dea65f40fe05f93
    x-tl: +!
    networks:
      - wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      PEERS: 1
    volumes:
      - wireguard-data:/config
    ports:
      - 51820:51820/udp

volumes:
  wireguard-data:

networks:
  wireguard:

