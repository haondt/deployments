services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest@sha256:34197b6d2731468a0e77eeb31723af07faf342878be66c1e861e287ec3600b3c
    x-tl: +!
    networks:
      - wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      PEERS: 1
    volumes:
      - wireguard-data:/config
    ports:
      - 51820:51820/udp

volumes:
  wireguard-data:

networks:
  wireguard:

