services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest@sha256:2c0b2809181e71521733973a73482aa1e0ae2c14809a09a5270b209be03b60aa
    x-tl: +!
    networks:
      - wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      PEERS: 1
    volumes:
      - wireguard-data:/config
    ports:
      - 51820:51820/udp

volumes:
  wireguard-data:

networks:
  wireguard:

