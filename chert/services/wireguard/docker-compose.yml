services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest@sha256:f85af86cac70a091523947a7208f77002ce14f14555797779497745e65dedd6f
    x-tl: +!
    networks:
      - wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Etc/UTC
      PEERS: 1
    volumes:
      - wireguard-data:/config
    ports:
      - 51820:51820/udp

volumes:
  wireguard-data:

networks:
  wireguard:

