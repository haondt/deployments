components:
  primary:
    image: ghcr.io/open-webui/open-webui:v0.9.6
    talos: +!
    resources.limits.memory: 1Gi
    networking:
      ports:
        http: 8080
      gateway.http_routes:
        - port: http
          host: "open-webui.{{ haondt__default_host }}"
    volumes:
      config:
        src.pvc.size: 1Gi
        dest.dir: /app/backend/data
