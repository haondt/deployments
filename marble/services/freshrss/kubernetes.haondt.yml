components:
  primary:
    image: docker.io/freshrss/freshrss:1.29.1@sha256:ab6b363102ccdbc39f6a62db926f567c61a5289bf25ba460f1c34423d8cc1a4d
    talos: +!
    networking:
      ports:
        http: 80
      gateway.http_routes:
        - port: http
          host: "freshrss.{{ haondt__default_host }}"
    volumes:
      primary-data:
        src.pvc.size: 128Mi
        dest.dir: /var/www/FreshRSS/data
      primary-extensions:
        src.pvc.size: 128Mi
        dest.dir: /var/www/FreshRSS/extensions
    environment:
      - raw:
          TZ: America/Edmonton
          CRON_MIN: '1,31'
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: freshrss-data
          source.volumes: &charon_source
            primary-data: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source

