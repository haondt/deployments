components:
  primary:
    image: docker.io/freshrss/freshrss:1.28.1@sha256:9100f649f5c946f589f54cdb9be7a65996528f48f691ef90eb262a0e06e5a522
    talos: +!
    networking:
      ports:
        http: 80
      gateway.http_routes:
        - port: http
          host: "freshrss.{{ haondt__default_host }}"
    volumes:
      primary-data:
        src.pvc.size: 128Mi
        dest.dir: /var/www/FreshRSS/data
      primary-extensions:
        src.pvc.size: 128Mi
        dest.dir: /var/www/FreshRSS/extensions
    environment:
      - raw:
          TZ: America/Edmonton
          CRON_MIN: '1,31'
