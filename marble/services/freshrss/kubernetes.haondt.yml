components:
  primary:
    image: docker.io/freshrss/freshrss:1.29.0@sha256:cca8988d05cd449e1c6c69405971b1e6fc2c2116ceeb45c9fa3fc33837997a75
    talos: +!
    networking:
      ports:
        http: 80
      gateway.http_routes:
        - port: http
          host: "freshrss.{{ haondt__default_host }}"
    volumes:
      primary-data:
        src.pvc.size: 128Mi
        dest.dir: /var/www/FreshRSS/data
      primary-extensions:
        src.pvc.size: 128Mi
        dest.dir: /var/www/FreshRSS/extensions
    environment:
      - raw:
          TZ: America/Edmonton
          CRON_MIN: '1,31'
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: freshrss-data
          source.volumes: &charon_source
            primary-data: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source

