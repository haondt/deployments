components:
  primary:
    image: docker.io/agregarr/agregarr:v2.4.1@sha256:6022aef7ad580478bf100ee4b11f19ad689bb780d241e78e33a3ccc6b5feb569
    talos: +!
    resources:
      limits.memory: 512Mi
    networking:
      ports:
        http: 7171
      gateway.http_routes:
        - port: http
          host: "agregarr.{{ haondt__default_host }}"
    volumes:
      config:
        src.pvc.size: 128Mi
        dest.dir: /app/config
