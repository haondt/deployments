components:
  primary:
    image: docker.io/agregarr/agregarr:v2.4.2@sha256:5f1390bc43fefbbfb67f38a7a8dd65b4086c1f187a37c8df5c6020a498e5d1b5
    talos: +!
    resources:
      limits.memory: 512Mi
    networking:
      ports:
        http: 7171
      gateway.http_routes:
        - port: http
          host: "agregarr.{{ haondt__default_host }}"
    volumes:
      config:
        src.pvc.size: 128Mi
        dest.dir: /app/config
