components:
  primary:
    image: &tag ghcr.io/tt-rss/tt-rss:latest@sha256:9a5267f94c0d83ea81b4a77e2109f9cb16b6dcfd0f3eba2dbf0e99d1020a52ac
    talos: +!
    networking:
      ports:
        http:
          port: 80
          container: nginx
      dependencies:
        - name: db
          port: http
      gateway.http_routes:
        - port: http
          host: "ttrss.{{ haondt__default_host }}"
    volumes:
      primary-data:
        src.pvc.size: 128Mi
        dest.dir: /var/www/html
    environment:
      - raw: &env
          TTRSS_DB_USER: postgres
          TTRSS_DB_NAME: postgres
          TTRSS_DB_PASS: postgres
          TTRSS_DB_HOST: ttrss-db
          HTTP_PORT: 8280
          APP_WEB_ROOT: /var/www/html/tt-rss
          APP_BASE: ""
          APP_UPSTREAM: localhost
          RESOLVER: kube-dns.kube-system.svc.cluster.local
    sidecars:
      updater:
        image: *tag
        talos: x
        command: [/opt/tt-rss/updater.sh]
        volumes:
          primary-data:
            src.volume.name: primary-data
            dest.dir: /var/www/html
        environment:
          - raw: *env
      nginx:
        image: ghcr.io/tt-rss/tt-rss-web-nginx:latest
        talos: +!
        volumes:
          primary-data:
            src.volume.name: primary-data
            dest:
              read_only: true
              dir: /var/www/html
        environment:
          - raw: *env

  db:
    image: docker.io/library/postgres:18-alpine@sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88
    talos: ^!
    networking:
      ports:
        http: 5432
    volumes:
      db-data:
        src.pvc.size: 128Mi
        dest.dir: /var/lib/postgresql
    environment:
      - raw: 
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: ttrss-db
          source.volumes: &charon_source
            db-data: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source


