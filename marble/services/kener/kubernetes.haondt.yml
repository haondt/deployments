components:
  primary:
    image: ghcr.io/rajnandan1/kener:latest@sha256:bd63770401c399c2917b9867529ca5e0dda51c7cf2d1114fd341eb5c9a413026
    talos: +!
    networking:
      ports:
        http: 3000
      rathole_routes:
        - port: http
          host: "status.{{ haondt__default_public_host }}"
    environment:
      - raw:
          KENER_SECRET_KEY: "{{ kener__secret_key }}"
        secret: true
      - raw:
          ORIGIN: "https://status.{{ haondt__default_public_host }}"
    startup:
      tasks:
        - chown:
            paths: [/app/uploads, /app/database]
            owner: 1000:1000
    volumes:
      uploads:
        src.pvc: {}
        dest.dir: /app/uploads
      database:
        src.pvc: {}
        dest.dir: /app/database
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: kener-primary
          source.volumes: &charon_source
            uploads: [/]
            database: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source
