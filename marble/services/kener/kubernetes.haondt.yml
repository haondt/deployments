components:
  primary:
    image: ghcr.io/rajnandan1/kener:latest@sha256:e7181feb260aaff98c466eb693217205e3d1cf323b46716ed3133246e828180b
    talos: +!
    networking:
      ports:
        http: 3000
      rathole_routes:
        - port: http
          host: "status.{{ haondt__default_public_host }}"
      dependencies:
        - name: redis
          port: http
    environment:
      - raw:
          KENER_SECRET_KEY: "{{ kener__secret_key }}"
        secret: true
      - raw:
          ORIGIN: "https://status.{{ haondt__default_public_host }}"
          REDIS_URL: redis://kener-redis:6379
    startup:
      tasks:
        - chown:
            paths: [/app/uploads, /app/database]
            owner: 1000:1000
    volumes:
      uploads:
        src.pvc: {}
        dest.dir: /app/uploads
      database:
        src.pvc: {}
        dest.dir: /app/database
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: kener-primary
          source.volumes: &charon_source
            uploads: [/]
            database: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source
  redis:
    image: docker.io/library/redis:7-alpine@sha256:119c9edaa6389b4c141f7faa74dae3f3b91ac50c3376d39596044ef07c2592e2
    talos: ^!
    command: ['redis-server','--appendonly','yes']
    networking:
      ports:
        http: 6379
    volumes:
      redis-data:
        src.pvc: {}
        dest.dir: /data
    startup:
      tasks:
        - chmod:
            paths: [/data]
            mode: '0777'

