components:
  primary:
    image: ghcr.io/rajnandan1/kener:latest@sha256:7fa9d18d07f7013ae971d925dd91614cfaeca8ff5d0a064396736cafd664bcb5
    talos: +!
    networking:
      ports:
        http: 3000
      rathole_routes:
        - port: http
          host: "status.{{ haondt__default_public_host }}"
      dependencies:
        - name: redis
          port: http
    environment:
      - raw:
          KENER_SECRET_KEY: "{{ kener__secret_key }}"
        secret: true
      - raw:
          ORIGIN: "https://status.{{ haondt__default_public_host }}"
          REDIS_URL: redis://kener-redis:6379
    startup:
      tasks:
        - chown:
            paths: [/app/uploads, /app/database]
            owner: 1000:1000
    volumes:
      uploads:
        src.pvc: {}
        dest.dir: /app/uploads
      database:
        src.pvc: {}
        dest.dir: /app/database
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: kener-primary
          source.volumes: &charon_source
            uploads: [/]
            database: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source
  redis:
    image: redis:7-alpine
    talos: ^!
    command: redis-server --appendonly yes
    networking:
      ports:
        http: 6379
    volumes:
      redis-data:
        src.pvc: {}
        dest.dir: /data
    startup:
      tasks:
        - chmod:
            paths: [/data]
            mode: '0777'

