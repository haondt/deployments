components:
  primary:
    image: &planka_image ghcr.io/plankanban/planka:2.1.1
    talos: +:!!!*
    networking:
      ports:
        http: 1337
      dependencies:
        - name: db
          port: http
      gateway.http_routes:
        - port: http
          host: "planka.{{ haondt__default_host }}"
    volumes:
      background-images:
        src.pvc.size: 128Mi
        dest.dir: /app/public/project-background-images
      background-images-2:
        src.pvc.size: 128Mi
        dest.dir: /app/public/background-images
      user-avatars:
        src.pvc.size: 128Mi
        dest.dir: /app/public/user-avatars
      attachments:
        src.pvc.size: 128Mi
        dest.dir: /app/private/attachments
      data:
        src.pvc.size: 128Mi
        dest.dir: /app/data
    environment:
      - raw:
          BASE_URL: "https://planka.{{ haondt__default_host }}"
          DATABASE_URL: postgresql://postgres@planka-db:5432/planka
          SECRET_KEY: "{{ planka__secret_key }}"
          DEFAULT_ADMIN_EMAIL: planka@example.com # Do not remove if you want to prevent this user from being edited/deleted
          DEFAULT_ADMIN_PASSWORD: planka
          DEFAULT_ADMIN_NAME: "Planka Admin"
          DEFAULT_ADMIN_USERNAME: "planka"
          SHOW_DETAILED_AUTH_ERRORS: true
    startup:
      tasks:
        - custom:
            image: *planka_image
            command: [sh, -c]
            security.user: 0
            args: |-
              npm run db:upgrade
              mkdir -p \
                /app/data/protected \
                /app/data/private && \
                for folder in user-avatars background-images; do \
                  cp -av \
                    /app/public/$folder \
                    /app/data/protected; \
                done && \
                cp -av /app/private/attachments /app/data/private
  db:
    image: docker.io/library/postgres:16-alpine@sha256:16bc17c64a573ef34162af9298258d1aec548232985b33ed7b1eac33ba35c229
    talos: ^!
    networking:
      ports:
        http: 5432
    volumes:
      db-data:
        src.pvc.size: 128Mi
        dest.dir: /var/lib/postgresql/data
    environment:
      - raw: 
          POSTGRES_DB: planka
          POSTGRES_HOST_AUTH_METHOD: trust
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: planka-db
          source.volumes: &charon_source
            db-data: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source

