components:
  primary:
    image: docker.io/danielszabo99/microbin:2.1.4@sha256:6660e5ccad0d764fa3c0032464ffb8f4b4f28c92a2eb9e39202b94cdc5b68909
    talos: +!
    networking:
      ports:
        http: 8080
      rathole_routes:
        - port: http
          host: "microbin.{{ haondt__default_cloud_host }}"
    environment:
      - raw:
          MICROBIN_HIDE_LOGO: true
          MICROBIN_PRIVATE: true
          MICROBIN_GC_DAYS: 0
          MICROBIN_QR: true
          MICROBIN_ETERNAL_PASTA: true
          MICROBIN_DEFAULT_EXPIRY: 24hour
          MICROBIN_LIST_SERVER: false
    volumes:
      uploads:
        src.pvc.size: 64Mi
        dest.dir: /app/microbin_data
