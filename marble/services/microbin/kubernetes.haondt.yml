components:
  primary:
    image: docker.io/danielszabo99/microbin:2.1.2@sha256:4e08d1d127e5804f5e43a63c0c9555497d506ee94abb570214134b73a4810f62
    talos: +!
    networking:
      ports:
        http: 8080
      rathole_routes:
        - port: http
          host: "microbin.{{ haondt__default_cloud_host }}"
    environment:
      - raw:
          MICROBIN_HIDE_LOGO: true
          MICROBIN_PRIVATE: true
          MICROBIN_GC_DAYS: 0
          MICROBIN_QR: true
          MICROBIN_ETERNAL_PASTA: true
          MICROBIN_DEFAULT_EXPIRY: 24hour
          MICROBIN_LIST_SERVER: false
    volumes:
      uploads:
        src.pvc.size: 64Mi
        dest.dir: /app/microbin_data
