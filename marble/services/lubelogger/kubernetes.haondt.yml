components:
  primary:
    image: ghcr.io/hargata/lubelogger:latest@sha256:82093696a6cfd73c3b6678e6233acb25e9979604ee9659faa3f955e6895ba191
    talos: +!
    networking:
      ports:
        http: 8080
      gateway.http_routes:
        - port: http
          host: "lubelogger.{{ haondt__default_host }}"
    volumes:
      data:
        src.pvc.size: 128Mi
        dest.dir: /App/data
      keys:
        src.pvc.size: 128Mi
        dest.dir: /root/.aspnet/DataProtection-Keys
    charon:
      overlays: [weekly]
      backups:
        - overlays: [default-hzsb]
          repository_configs:
            - raw: |-
                backend:
                  path: deployments-lubelogger
                unlock: true
          source.volumes:
            data: [/]
            keys: [/]
