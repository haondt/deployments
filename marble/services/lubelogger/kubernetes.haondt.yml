components:
  primary:
    image: ghcr.io/hargata/lubelogger:latest@sha256:c8f0bfd48b62be4757f03c94267d74f11c79bb0a76595fe4d02dc97ea9b8b5fa
    talos: +!
    networking:
      ports:
        http: 8080
      gateway.http_routes:
        - port: http
          host: "lubelogger.{{ haondt__default_host }}"
    volumes:
      data:
        src.pvc.size: 128Mi
        dest.dir: /App/data
      keys:
        src.pvc.size: 128Mi
        dest.dir: /root/.aspnet/DataProtection-Keys
    charon:
      overlays: [weekly]
      backups:
        - overlays: [default-hzsb]
          repository_configs:
            - raw: |-
                backend:
                  path: deployments-lubelogger
                unlock: true
          source.volumes:
            data: [/]
            keys: [/]
