components:
  primary:
    image: ghcr.io/cleanuparr/cleanuparr:latest@sha256:18978713a216ec507511523deb112e6115b84d5284c21aaffe455d132dbfb4be
    talos: +!
    resources:
      limits.memory: 512Mi
    networking:
      ports:
        http: 11011
      gateway.http_routes:
        - port: http
          host: "cleanuparr.{{ haondt__default_host }}"
    volumes:
      config:
        src.pvc.size: 128Mi
        dest.dir: /config
    environment:
      - raw: 
          PORT: 11011
          PUID: 1000
          PGID: 1000
