components:
  primary:
    image: ghcr.io/cleanuparr/cleanuparr:latest@sha256:6c14c9560f0d97f248d02369fd9b122ec2d6d04af51b6c4ec87e7084b913cdf7
    talos: +!
    resources:
      limits.memory: 512Mi
    networking:
      ports:
        http: 11011
      gateway.http_routes:
        - port: http
          host: "cleanuparr.{{ haondt__default_host }}"
    volumes:
      config:
        src.pvc.size: 128Mi
        dest.dir: /config
    environment:
      - raw: 
          PORT: 11011
          PUID: 1000
          PGID: 1000
