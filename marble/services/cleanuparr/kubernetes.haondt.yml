components:
  primary:
    image: ghcr.io/cleanuparr/cleanuparr:latest@sha256:9e0de69a07d47edc6de9ffa629751112db68af54c26c5d384ca3370365b1ce8a
    talos: +!
    resources:
      limits.memory: 512Mi
    networking:
      ports:
        http: 11011
      gateway.http_routes:
        - port: http
          host: "cleanuparr.{{ haondt__default_host }}"
    volumes:
      config:
        src.pvc.size: 128Mi
        dest.dir: /config
    environment:
      - raw: 
          PORT: 11011
          PUID: 1000
          PGID: 1000
