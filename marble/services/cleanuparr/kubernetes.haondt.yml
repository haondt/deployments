components:
  primary:
    image: ghcr.io/cleanuparr/cleanuparr:latest@sha256:563b01707cb4509731793ce03bfc26f08640f4194908cc1fa6782e75f59dc405
    talos: +!
    resources:
      limits.memory: 512Mi
    networking:
      ports:
        http: 11011
      gateway.http_routes:
        - port: http
          host: "cleanuparr.{{ haondt__default_host }}"
    volumes:
      config:
        src.pvc.size: 128Mi
        dest.dir: /config
    environment:
      - raw: 
          PORT: 11011
          PUID: 1000
          PGID: 1000
