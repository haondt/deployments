components:
  primary:
    image: ghcr.io/cleanuparr/cleanuparr:latest@sha256:1ec850e05c0fef0d27f9ef88f49b2aa9d41caca6f87185267d855a693466c79b
    talos: +!
    resources:
      limits.memory: 512Mi
    networking:
      ports:
        http: 11011
      gateway.http_routes:
        - port: http
          host: "cleanuparr.{{ haondt__default_host }}"
    volumes:
      config:
        src.pvc.size: 128Mi
        dest.dir: /config
    environment:
      - raw: 
          PORT: 11011
          PUID: 1000
          PGID: 1000
