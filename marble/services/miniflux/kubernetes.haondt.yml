components:
  primary:
    image: ghcr.io/miniflux/miniflux:2.3.2@sha256:cd353a6af9ce663291f405eddef26fa0d567f486b521c5d34e3fb50e41938b9a
    talos: +!
    networking:
      ports:
        http: 8080
      dependencies:
        - name: db
          port: http
      gateway.http_routes:
        - port: http
          host: "miniflux.{{ haondt__default_host }}"
    environment:
      - raw:
          DATABASE_URL: postgresql://miniflux:miniflux@miniflux-db/miniflux?sslmode=disable
          RUN_MIGRATIONS: 1
          CREATE_ADMIN: 1
          ADMIN_USERNAME: miniflux
          ADMIN_PASSWORD: miniflux
          FETCHER_ALLOW_PRIVATE_NETWORKS: 1
  db:
    image: docker.io/library/postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    talos: ^!
    networking:
      ports:
        http: 5432
    volumes:
      db-data:
        src.pvc.size: 128Mi
        dest.dir: /var/lib/postgresql
    environment:
      - raw: 
          POSTGRES_USER: miniflux
          POSTGRES_PASSWORD: miniflux
          POSTGRES_DB: miniflux
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: miniflux-db
          source.volumes: &charon_source
            db-data: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source
  drip:
    image: haumea/drip:0.1.2
    talos: x
    networking:
      ports:
        http: 5001
      gateway.http_routes:
        - port: http
          host: "drip.{{ haondt__default_host }}"
    volumes:
      drip-data:
        src.pvc.size: 128Mi
        dest.dir: /data
    environment:
      - raw:
          DRIP_BASE_URL: "https://drip.{{ haondt__default_host }}"
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &drip_charon_repository_configs
            - raw: |-
                backend:
                  path: miniflux-drip
          source.volumes: &drip_charon_source
            drip-data: [/]
        - overlays: [default-hzsb]
          repository_configs: *drip_charon_repository_configs
          source.volumes: *drip_charon_source
