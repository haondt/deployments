components:
  primary:
    image: ghcr.io/miniflux/miniflux:2.2.19@sha256:8810dfe7f4d9979f9dc1385607695c116f049daa586c635a9a1fb3c58936b074
    talos: +!
    networking:
      ports:
        http: 8080
      dependencies:
        - name: db
          port: http
      gateway.http_routes:
        - port: http
          host: "miniflux.{{ haondt__default_host }}"
    environment:
      - raw:
          DATABASE_URL: postgresql://miniflux:miniflux@miniflux-db/miniflux?sslmode=disable
          RUN_MIGRATIONS: 1
          CREATE_ADMIN: 1
          ADMIN_USERNAME: miniflux
          ADMIN_PASSWORD: miniflux
          FETCHER_ALLOW_PRIVATE_NETWORKS: 1
  db:
    image: docker.io/library/postgres:18-alpine@sha256:54451ecb8ab38c24c3ec123f2fd501303a3a1856a5c66e98cecf2460d5e1e9d7
    talos: ^!
    networking:
      ports:
        http: 5432
    volumes:
      db-data:
        src.pvc.size: 128Mi
        dest.dir: /var/lib/postgresql
    environment:
      - raw: 
          POSTGRES_USER: miniflux
          POSTGRES_PASSWORD: miniflux
          POSTGRES_DB: miniflux
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: miniflux-db
          source.volumes: &charon_source
            db-data: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source
  drip:
    image: haumea/drip:0.1.0
    talos: x
    networking:
      ports:
        http: 5001
      gateway.http_routes:
        - port: http
          host: "drip.{{ haondt__default_host }}"
    volumes:
      drip-data:
        src.pvc.size: 128Mi
        dest.dir: /data
    environment:
      - raw:
          DRIP_BASE_URL: "https://drip.{{ haondt__default_host }}"
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: miniflux-drip
          source.volumes: &charon_source
            db-data: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source
