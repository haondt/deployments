components:
  primary:
    image: ghcr.io/miniflux/miniflux:2.3.0@sha256:65266db84761d09d999946218adfc91fd7abbd4a1086f74b3ad0e51083e30df2
    talos: +!
    networking:
      ports:
        http: 8080
      dependencies:
        - name: db
          port: http
      gateway.http_routes:
        - port: http
          host: "miniflux.{{ haondt__default_host }}"
    environment:
      - raw:
          DATABASE_URL: postgresql://miniflux:miniflux@miniflux-db/miniflux?sslmode=disable
          RUN_MIGRATIONS: 1
          CREATE_ADMIN: 1
          ADMIN_USERNAME: miniflux
          ADMIN_PASSWORD: miniflux
          FETCHER_ALLOW_PRIVATE_NETWORKS: 1
  db:
    image: docker.io/library/postgres:18-alpine@sha256:96d56f7f57c6aacd1fcb908bc83b345ec5f83231ee486dd66a1baadce274db88
    talos: ^!
    networking:
      ports:
        http: 5432
    volumes:
      db-data:
        src.pvc.size: 128Mi
        dest.dir: /var/lib/postgresql
    environment:
      - raw: 
          POSTGRES_USER: miniflux
          POSTGRES_PASSWORD: miniflux
          POSTGRES_DB: miniflux
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &charon_repository_configs
            - raw: |-
                backend:
                  path: miniflux-db
          source.volumes: &charon_source
            db-data: [/]
        - overlays: [default-hzsb]
          repository_configs: *charon_repository_configs
          source.volumes: *charon_source
  drip:
    image: haumea/drip:0.1.1
    talos: x
    networking:
      ports:
        http: 5001
      gateway.http_routes:
        - port: http
          host: "drip.{{ haondt__default_host }}"
    volumes:
      drip-data:
        src.pvc.size: 128Mi
        dest.dir: /data
    environment:
      - raw:
          DRIP_BASE_URL: "https://drip.{{ haondt__default_host }}"
    charon:
      overlays: [daily]
      backups:
        - overlays: [default-gcs]
          repository_configs: &drip_charon_repository_configs
            - raw: |-
                backend:
                  path: miniflux-drip
          source.volumes: &drip_charon_source
            drip-data: [/]
        - overlays: [default-hzsb]
          repository_configs: *drip_charon_repository_configs
          source.volumes: *drip_charon_source
