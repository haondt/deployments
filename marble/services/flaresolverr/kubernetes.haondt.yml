components:
  primary:
    image: ghcr.io/flaresolverr/flaresolverr:latest@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
    talos: +!
    resources:
      limits.memory: 4Gi
    networking:
      ports:
        http: 8191
      gateway.http_routes:
        - port: http
          host: "flaresolverr.{{ haondt__default_host }}"
    volumes:
      config:
        src.pvc.size: 128Mi
        dest.dir: /config
